<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- Dark background for favicon context -->
  <rect width="100" height="100" rx="18" fill="#04060d"/>

  <!-- Hexagon -->
  <polygon
    points="50,12 78,27 78,58 50,73 22,58 22,27"
    fill="none"
    stroke="#52d2c4"
    stroke-width="3"
  />

  <!-- E mark -->
  <line x1="34" y1="33" x2="66" y2="33" stroke="#52d2c4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="34" y1="42.5" x2="58" y2="42.5" stroke="#52d2c4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="34" y1="52" x2="66" y2="52" stroke="#52d2c4" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="34" y1="33" x2="34" y2="52" stroke="#52d2c4" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Vertex nodes -->
  <circle cx="50" cy="12" r="4.5" fill="#52d2c4"/>
  <circle cx="78" cy="27" r="4.5" fill="#52d2c4"/>
  <circle cx="78" cy="58" r="4.5" fill="#52d2c4"/>
  <circle cx="50" cy="73" r="4.5" fill="#52d2c4"/>
  <circle cx="22" cy="58" r="4.5" fill="#52d2c4"/>
  <circle cx="22" cy="27" r="4.5" fill="#52d2c4"/>

</svg>
